{% set is_edit = project is defined and project and project.id %}
<div class="space-y-4">
    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Название проекта *</label>
        <input type="text" name="title" required
               value="{% if is_edit %}{{ project.title }}{% endif %}"
               placeholder="Разработка корпоративного сайта"
               class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"/>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Клиент</label>
            <select name="client_id"
                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <option value="">Без клиента</option>
                {% for c in clients %}
                <option value="{{ c.id }}" {% if is_edit and project.client_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Партнёр</label>
            <select name="partner_id" id="partner_select_{{ project.id if is_edit else 'new' }}"
                    onchange="updateMyShare(this)"
                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <option value="">Без партнёра</option>
                {% for p in partners %}
                <option value="{{ p.id }}" {% if is_edit and project.partner_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Статус</label>
        <select name="status"
                class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            <option value="new" {% if not is_edit or project.status.value == 'new' %}selected{% endif %}>Новый</option>
            <option value="in_progress" {% if is_edit and project.status.value == 'in_progress' %}selected{% endif %}>В работе</option>
            <option value="completed" {% if is_edit and project.status.value == 'completed' %}selected{% endif %}>Завершён</option>
            <option value="cancelled" {% if is_edit and project.status.value == 'cancelled' %}selected{% endif %}>Отменён</option>
        </select>
    </div>

    <div class="grid grid-cols-3 gap-4">
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Общая сумма</label>
            <input type="number" name="total_amount" step="0.01" min="0"
                   value="{% if is_edit %}{{ project.total_amount or 0 }}{% else %}0{% endif %}"
                   id="total_amount_{{ project.id if is_edit else 'new' }}"
                   oninput="updateMyShare(document.getElementById('partner_select_{{ project.id if is_edit else 'new' }}'))"
                   class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"/>
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Моя доля</label>
            <input type="number" name="my_share" step="0.01" min="0"
                   id="my_share_{{ project.id if is_edit else 'new' }}"
                   value="{% if is_edit %}{{ project.my_share or 0 }}{% else %}0{% endif %}"
                   class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"/>
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Валюта</label>
            <select name="currency"
                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <option value="RUB" {% if not is_edit or project.currency == 'RUB' %}selected{% endif %}>₽ RUB</option>
                <option value="USD" {% if is_edit and project.currency == 'USD' %}selected{% endif %}>$ USD</option>
                <option value="EUR" {% if is_edit and project.currency == 'EUR' %}selected{% endif %}>€ EUR</option>
            </select>
        </div>
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Аванс</label>
        <input type="number" name="advance_amount" step="0.01" min="0"
               value="{% if is_edit %}{{ project.advance_amount or 0 }}{% else %}0{% endif %}"
               class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"/>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Дата начала</label>
            <input type="date" name="start_date"
                   value="{% if is_edit and project.start_date %}{{ project.start_date.strftime('%Y-%m-%d') }}{% endif %}"
                   class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"/>
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Дата завершения</label>
            <input type="date" name="end_date"
                   value="{% if is_edit and project.end_date %}{{ project.end_date.strftime('%Y-%m-%d') }}{% endif %}"
                   class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"/>
        </div>
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Заметки</label>
        <textarea name="notes" rows="2"
                  class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"
                  placeholder="Описание проекта...">{% if is_edit %}{{ project.notes or '' }}{% endif %}</textarea>
    </div>
</div>

<script>
function updateMyShare(partnerSelect) {
    const suffix = partnerSelect.id.replace('partner_select_', '');
    const totalInput = document.getElementById('total_amount_' + suffix);
    const myShareInput = document.getElementById('my_share_' + suffix);
    if (!totalInput || !myShareInput) return;
    const total = parseFloat(totalInput.value) || 0;
    const hasPartner = partnerSelect.value !== '';
    myShareInput.value = hasPartner ? (total * 0.5).toFixed(2) : total.toFixed(2);
}
</script>
