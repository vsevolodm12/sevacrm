<div id="document-{{ document.id }}"
     class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-200 hover:border-slate-300 transition-colors">
    <div class="flex items-center gap-3 min-w-0">
        <div class="w-8 h-8 bg-white border border-slate-200 rounded flex items-center justify-center flex-shrink-0">
            {% if document.doc_type == 'contract' %}
            <svg class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            {% elif document.doc_type == 'invoice' %}
            <svg class="h-4 w-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/>
            </svg>
            {% else %}
            <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            {% endif %}
        </div>
        <div class="min-w-0">
            <p class="text-sm font-medium text-slate-800 truncate">{{ document.title }}</p>
            <p class="text-xs text-slate-400">
                {{ document.file_name }} · {{ "%.1f"|format(document.file_size / 1024) }} КБ
            </p>
        </div>
    </div>
    <div class="flex items-center gap-2 ml-3 flex-shrink-0">
        <a href="/documents/{{ document.id }}/download"
           class="p-1.5 text-slate-400 hover:text-indigo-600 transition-colors rounded"
           title="Скачать">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
        </a>
        <button
            hx-delete="/documents/{{ document.id }}"
            hx-target="#document-{{ document.id }}"
            hx-swap="outerHTML"
            hx-confirm="Удалить документ «{{ document.title }}»?"
            class="p-1.5 text-slate-400 hover:text-red-600 transition-colors rounded"
            title="Удалить">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </button>
    </div>
</div>
