<div id="partner-{{ partner.id }}" data-partner-item
     class="bg-white rounded-2xl hover:shadow-sm transition-all duration-200">

    <div class="p-5">
        <div class="flex items-start justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-violet-100 flex items-center justify-center text-violet-700 font-semibold text-sm flex-shrink-0">
                    {{ partner.name[0].upper() }}
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-slate-900">{{ partner.name }}</h3>
                    {% if not partner.is_active %}
                    <span class="text-xs text-slate-400">Неактивен</span>
                    {% endif %}
                </div>
            </div>
            <div class="flex items-center gap-0.5">
                <button hx-get="/partners/{{ partner.id }}/edit"
                        hx-target="#partner-edit-{{ partner.id }}"
                        hx-swap="innerHTML"
                        class="p-1.5 text-slate-300 hover:text-slate-600 transition-colors rounded-lg">
                    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
                <button type="button"
                        onclick="showDel('Удалить партнёра «{{ partner.name }}»?', () => htmx.ajax('DELETE', '/partners/{{ partner.id }}', {target:'#partner-{{ partner.id }}', swap:'delete'}))"
                        class="p-1.5 text-slate-300 hover:text-red-500 transition-colors rounded-lg">
                    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="space-y-1.5">
            {% if partner.phone %}
            <p class="text-xs text-slate-400">{{ partner.phone }}</p>
            {% endif %}
            {% if partner.telegram %}
            <p class="text-xs text-slate-400">{{ partner.telegram }}</p>
            {% endif %}
        </div>
    </div>

    <div class="px-5 py-3 border-t border-slate-50 flex gap-5">
        <div>
            <p class="text-base font-semibold text-slate-900">{{ clients_count }}</p>
            <p class="text-xs text-slate-400">заказов</p>
        </div>
        <div>
            <p class="text-base font-semibold text-slate-900">{{ projects_count }}</p>
            <p class="text-xs text-slate-400">проектов</p>
        </div>
    </div>

    <div id="partner-edit-{{ partner.id }}"></div>
</div>
