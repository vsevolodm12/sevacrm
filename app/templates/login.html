<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход — SevaCRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Inter','Segoe UI','sans-serif'] },
                }
            }
        }
    </script>
    <style>* { -webkit-font-smoothing: antialiased; }</style>
</head>
<body class="h-full bg-slate-100 font-sans flex items-center justify-center">

<div class="w-full max-w-sm mx-4">
    <div class="text-center mb-8">
        <span class="text-3xl font-bold text-slate-900">Seva<span class="text-indigo-400">CRM</span></span>
        <p class="mt-2 text-sm text-slate-500">Личная CRM для фрилансера</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        <h2 class="text-lg font-semibold text-slate-900 mb-6">Вход в систему</h2>

        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700 flex items-center gap-2">
            <svg class="h-4 w-4 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post" class="space-y-4">
            <div>
                <label for="username" class="mb-2 block text-sm font-medium text-slate-600">Имя пользователя</label>
                <input type="text" id="username" name="username" autocomplete="username" required
                       class="w-full rounded-xl bg-slate-50 px-4 py-3 text-sm outline-none ring-1 ring-slate-200 transition-all focus:bg-white focus:ring-2 focus:ring-slate-900"
                       placeholder="admin"/>
            </div>

            <div>
                <label for="password" class="mb-2 block text-sm font-medium text-slate-600">Пароль</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required
                       class="w-full rounded-xl bg-slate-50 px-4 py-3 text-sm outline-none ring-1 ring-slate-200 transition-all focus:bg-white focus:ring-2 focus:ring-slate-900"
                       placeholder="••••••••"/>
            </div>

            <button type="submit"
                    class="w-full rounded-xl bg-slate-900 py-3 text-sm font-semibold text-white transition-colors hover:bg-slate-800 mt-2">
                Войти
            </button>
        </form>

        <p class="mt-4 text-xs text-slate-400 text-center">Сессия действует 30 дней</p>
    </div>
</div>

</body>
</html>
