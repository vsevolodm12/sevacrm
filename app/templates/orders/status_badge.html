<div id="order-status-{{ order.id }}" x-data="{ open: false }" class="relative mt-1">
    <button @click="open = !open"
            class="inline-flex items-center gap-1.5 rounded-lg px-2.5 py-1.5 text-sm font-medium transition-colors
                   {% if order.is_completed %}text-indigo-600 bg-indigo-50 hover:bg-indigo-100
                   {% elif order.is_active %}text-emerald-600 bg-emerald-50 hover:bg-emerald-100
                   {% else %}text-slate-500 bg-slate-100 hover:bg-slate-200{% endif %}">
        <span class="h-1.5 w-1.5 rounded-full {% if order.is_completed %}bg-indigo-400{% elif order.is_active %}bg-emerald-500{% else %}bg-slate-300{% endif %}"></span>
        {% if order.is_completed %}Завершён{% elif order.is_active %}Активен{% else %}Архив{% endif %}
        <svg class="h-3 w-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>
    <div x-show="open" @click.away="open = false" x-transition
         class="absolute left-0 top-full mt-1 z-20 min-w-36 rounded-xl bg-white shadow-lg overflow-hidden"
         style="box-shadow:0 4px 24px rgba(0,0,0,0.10)">
        <button hx-put="/orders/{{ order.id }}/status"
                hx-vals='{"status": "active"}'
                hx-target="#order-status-{{ order.id }}"
                hx-swap="outerHTML"
                @click="open = false"
                class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors {% if order.is_active and not order.is_completed %}font-semibold{% endif %}">
            <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>Активен
        </button>
        <button hx-put="/orders/{{ order.id }}/status"
                hx-vals='{"status": "completed"}'
                hx-target="#order-status-{{ order.id }}"
                hx-swap="outerHTML"
                @click="open = false"
                class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors {% if order.is_completed %}font-semibold{% endif %}">
            <span class="h-1.5 w-1.5 rounded-full bg-indigo-400"></span>Завершён
        </button>
        <button hx-put="/orders/{{ order.id }}/status"
                hx-vals='{"status": "inactive"}'
                hx-target="#order-status-{{ order.id }}"
                hx-swap="outerHTML"
                @click="open = false"
                class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors {% if not order.is_active and not order.is_completed %}font-semibold{% endif %}">
            <span class="h-1.5 w-1.5 rounded-full bg-slate-300"></span>Архив
        </button>
    </div>
</div>
