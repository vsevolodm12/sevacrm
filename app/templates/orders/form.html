<!-- Inline edit form (returned via HTMX GET /orders/{id}/edit) -->
<div class="p-5"
     x-data="editOrderForm('{{ order.currency }}', {{ order.monthly_fee or 0 }}, {{ order.dev_price or 0 }}, {{ order.advance_amount or 0 }})"
     x-init="fetchRates(); $nextTick(() => { $refs.monthlyInput.value = fmt(monthly); $refs.devInput.value = fmt(dev); $refs.advanceInput.value = fmt(advance); })">
    <form hx-put="/orders/{{ order.id }}"
          hx-target="#order-{{ order.id }}"
          hx-swap="outerHTML"
          class="space-y-3">

        <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Название заказа</label>
            <input type="text" name="title" value="{{ order.title or '' }}" placeholder="Поддержка сайта..."
                   class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 text-sm outline-none transition-all"/>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Клиент *</label>
                <input type="text" name="name" value="{{ order.name }}" required
                       class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 text-sm outline-none transition-all"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Телефон</label>
                <input type="text" name="phone" value="{{ order.phone or '' }}"
                       class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 text-sm outline-none transition-all"/>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Дата начала</label>
                <input type="text" name="start_date"
                       value="{{ order.start_date.strftime('%d.%m.%Y') if order.start_date else '' }}"
                       placeholder="ДД.ММ.ГГГГ" maxlength="10"
                       @input="maskDate($event)"
                       class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 text-sm outline-none transition-all"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Дата окончания <span class="text-slate-300 font-normal">опц.</span></label>
                <input type="text" name="end_date"
                       value="{{ order.end_date.strftime('%d.%m.%Y') if order.end_date else '' }}"
                       placeholder="ДД.ММ.ГГГГ" maxlength="10"
                       @input="maskDate($event)"
                       class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 text-sm outline-none transition-all"/>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Абон. плата</label>
                <div class="relative">
                    <input type="text"
                           x-ref="monthlyInput"
                           @input="liveFormat($event, 'monthly')"
                           @focus="$event.target.select()"
                           placeholder="0"
                           class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 pr-8 text-sm outline-none transition-all"/>
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"
                          x-text="curSymbol"></span>
                </div>
                <input type="hidden" name="monthly_fee" :value="monthly">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Разработка</label>
                <div class="relative">
                    <input type="text"
                           x-ref="devInput"
                           @input="liveFormat($event, 'dev')"
                           @focus="$event.target.select()"
                           placeholder="0"
                           class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 pr-8 text-sm outline-none transition-all"/>
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"
                          x-text="curSymbol"></span>
                </div>
                <input type="hidden" name="dev_price" :value="dev">
            </div>
        </div>

        <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Аванс получен</label>
            <div class="relative">
                <input type="text"
                       x-ref="advanceInput"
                       @input="liveFormat($event, 'advance')"
                       @focus="$event.target.select()"
                       placeholder="0"
                       class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-900 focus:bg-white rounded-xl px-3.5 py-2.5 pr-8 text-sm outline-none transition-all"/>
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"
                      x-text="curSymbol"></span>
            </div>
            <input type="hidden" name="advance_amount" :value="advance">
        </div>

        <div class="flex items-center justify-between">
            <!-- Currency toggle -->
            <div class="inline-flex bg-slate-100 rounded-xl p-0.5 gap-0.5">
                <button type="button" @click="switchCur('RUB')"
                        :class="cur==='RUB' ? 'bg-white shadow-sm text-slate-900 font-semibold' : 'text-slate-400'"
                        class="px-3 py-1.5 text-xs rounded-lg transition-all">₽</button>
                <button type="button" @click="switchCur('USD')"
                        :class="cur==='USD' ? 'bg-white shadow-sm text-slate-900 font-semibold' : 'text-slate-400'"
                        class="px-3 py-1.5 text-xs rounded-lg transition-all">$</button>
                <button type="button" @click="switchCur('EUR')"
                        :class="cur==='EUR' ? 'bg-white shadow-sm text-slate-900 font-semibold' : 'text-slate-400'"
                        class="px-3 py-1.5 text-xs rounded-lg transition-all">€</button>
                <input type="hidden" name="currency" :value="cur">
            </div>
            <!-- Active toggle -->
            <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" name="is_active" value="on" {{ 'checked' if order.is_active }} class="sr-only peer">
                <div class="w-9 h-5 bg-slate-200 peer-checked:bg-emerald-500 rounded-full relative transition-colors
                            after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:bg-white after:rounded-full after:transition-all
                            peer-checked:after:translate-x-4"></div>
                <span class="text-xs text-slate-500">Активен</span>
            </label>
        </div>

        {% if partners is defined %}
        <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Партнёр</label>
            <div x-data="{pid:'{{ order.partner_id or '' }}'}" class="flex flex-wrap gap-1.5">
                <button type="button" @click="pid=''"
                        :class="pid==='' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="px-2.5 py-1 text-xs font-medium rounded-full transition-all">Без партнёра</button>
                {% for p in partners %}
                <button type="button" @click="pid='{{ p.id }}'"
                        :class="pid==='{{ p.id }}' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="px-2.5 py-1 text-xs font-medium rounded-full transition-all">{{ p.name }}</button>
                {% endfor %}
                <input type="hidden" name="partner_id" :value="pid">
            </div>
        </div>
        {% endif %}

        <div class="flex justify-end gap-2 pt-1">
            <button type="button"
                    onclick="document.getElementById('order-edit-{{ order.id }}').innerHTML=''"
                    class="px-3 py-2 text-sm text-slate-500 hover:text-slate-800 transition-colors">Отмена</button>
            <button type="submit"
                    class="px-4 py-2 text-sm bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl transition-colors">Сохранить</button>
        </div>
    </form>
</div>

<script>
function editOrderForm(initCur, initMonthly, initDev, initAdvance) {
    return {
        cur: initCur || 'RUB',
        rates: { RUB: 1, USD: 90, EUR: 98 },
        monthly: initMonthly,
        dev: initDev,
        advance: initAdvance,
        get curSymbol() {
            return this.cur === 'USD' ? '$' : (this.cur === 'EUR' ? '€' : '₽');
        },
        fmt(n) {
            if (!n || isNaN(n) || n == 0) return '';
            return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
        },
        parseNum(s) {
            return parseFloat(String(s).replace(/[\s\u00a0,]/g, '')) || 0;
        },
        liveFormat(e, field) {
            const el = e.target;
            const cursor = el.selectionStart;
            const oldLen = el.value.length;
            const raw = el.value.replace(/[\s\u00a0,]/g, '');
            const num = parseFloat(raw) || 0;
            this[field] = num;
            const formatted = num > 0 ? this.fmt(num) : raw;
            el.value = formatted;
            const delta = formatted.length - oldLen;
            el.selectionStart = el.selectionEnd = Math.max(0, cursor + delta);
        },
        maskDate(e) {
            const el = e.target;
            let v = el.value.replace(/\D/g, '').slice(0, 8);
            if (v.length >= 5) v = v.slice(0, 2) + '.' + v.slice(2, 4) + '.' + v.slice(4);
            else if (v.length >= 3) v = v.slice(0, 2) + '.' + v.slice(2);
            el.value = v;
        },
        async fetchRates() {
            try {
                const r = await fetch('/api/rates');
                this.rates = await r.json();
            } catch(e) {}
        },
        switchCur(newCur) {
            if (newCur === this.cur) return;
            const from = this.rates[this.cur];
            const to = this.rates[newCur];
            const convert = v => v > 0 ? Math.round(v * from / to * 100) / 100 : 0;
            this.monthly = convert(this.monthly);
            this.dev = convert(this.dev);
            this.advance = convert(this.advance);
            this.cur = newCur;
            this.$nextTick(() => {
                if (this.$refs.monthlyInput) this.$refs.monthlyInput.value = this.fmt(this.monthly);
                if (this.$refs.devInput) this.$refs.devInput.value = this.fmt(this.dev);
                if (this.$refs.advanceInput) this.$refs.advanceInput.value = this.fmt(this.advance);
            });
        }
    }
}
</script>
