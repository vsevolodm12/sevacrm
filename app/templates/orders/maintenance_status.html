<div id="maintenance-status-{{ order.id }}">
    {% if order.is_active %}
    <button hx-put="/orders/{{ order.id }}/toggle-maintenance"
            hx-target="#maintenance-status-{{ order.id }}"
            hx-swap="outerHTML"
            class="flex items-center gap-2 rounded-xl bg-emerald-50 px-3 py-2 text-xs font-semibold text-emerald-700 hover:bg-emerald-100 transition-colors">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full inline-block"></span>
        Активно — нажмите чтобы остановить
    </button>
    {% else %}
    <button hx-put="/orders/{{ order.id }}/toggle-maintenance"
            hx-target="#maintenance-status-{{ order.id }}"
            hx-swap="outerHTML"
            class="flex items-center gap-2 rounded-xl bg-slate-100 px-3 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-200 transition-colors">
        <span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block"></span>
        Остановлено — нажмите чтобы включить
    </button>
    {% endif %}
</div>
